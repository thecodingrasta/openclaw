name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Verify Swift version
        run: swift --version

      - name: Install Node / pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install JS dependencies
        run: pnpm install --ignore-scripts

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Write LocalSigning.xcconfig
        working-directory: apps/ios
        run: |
          cat > LocalSigning.xcconfig << 'EOF'
          OPENCLAW_CODE_SIGN_STYLE = Manual
          OPENCLAW_DEVELOPMENT_TEAM =
          OPENCLAW_APP_BUNDLE_ID = ai.openclaw.ios.unsigned
          OPENCLAW_SHARE_BUNDLE_ID = ai.openclaw.ios.unsigned.share
          OPENCLAW_WATCH_APP_BUNDLE_ID = ai.openclaw.ios.unsigned.watchkitapp
          OPENCLAW_WATCH_EXTENSION_BUNDLE_ID = ai.openclaw.ios.unsigned.watchkitapp.extension
          OPENCLAW_ACTIVITY_WIDGET_BUNDLE_ID = ai.openclaw.ios.unsigned.widget
          OPENCLAW_APP_PROFILE =
          OPENCLAW_SHARE_PROFILE =
          EOF

      - name: Strip push entitlement
        working-directory: apps/ios
        run: |
          cat > Sources/OpenClaw.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict/>
          </plist>
          EOF

      - name: Patch GatewaySettingsStore Swift 6 concurrency error
        working-directory: apps/ios
        run: |
          sed -i '' \
            's/    private static let isoFormatter: ISO8601DateFormatter = {/    nonisolated(unsafe) private static let isoFormatter: ISO8601DateFormatter = {/' \
            Sources/Gateway/GatewaySettingsStore.swift

      - name: Strip Share extension and Activity Widget from project.yml only
        working-directory: apps/ios
        run: |
          python3 - << 'PYEOF'
          import re

          with open("project.yml", "r") as f:
              content = f.read()

          # Remove only Share extension and Activity Widget from main app deps
          # Keep Watch app dependency intact
          content = re.sub(
              r'\s*- target: OpenClawShareExtension\s*\n\s*embed: true\n',
              '\n',
              content
          )
          content = re.sub(
              r'\s*- target: OpenClawActivityWidget\s*\n\s*embed: true\n',
              '\n',
              content
          )

          with open("project.yml", "w") as f:
              f.write(content)

          print("project.yml patched — Share extension and Activity Widget removed, Watch kept")
          PYEOF

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      - name: Build (unsigned, Watch included)
        working-directory: apps/ios
        run: |
          xcodebuild \
            -project OpenClaw.xcodeproj \
            -scheme OpenClaw \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            build

      - name: Package into IPA
        working-directory: apps/ios
        run: |
          APP_PATH=$(find build/DerivedData -name "OpenClaw.app" -not -path "*/Test*" | head -1)
          echo "Found: $APP_PATH"

          file "$APP_PATH/OpenClaw"
          lipo -info "$APP_PATH/OpenClaw"

          # Remove Share extension and Activity Widget plugin bundles only
          # Leave Watch directory alone
          rm -rf "$APP_PATH/PlugIns/OpenClawShareExtension.appex" 2>/dev/null || true
          rm -rf "$APP_PATH/PlugIns/OpenClawActivityWidget.appex" 2>/dev/null || true
          # Remove PlugIns dir entirely if now empty
          rmdir "$APP_PATH/PlugIns" 2>/dev/null || true

          mkdir -p build/IPA/Payload
          cp -r "$APP_PATH" build/IPA/Payload/OpenClaw.app
          cd build/IPA
          zip -r ../OpenClaw.ipa Payload
          echo "IPA size: $(du -sh ../OpenClaw.ipa)"
          echo "IPA contents:"
          unzip -l ../OpenClaw.ipa | grep -E "\.app|\.appex|Watch" | head -20

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-unsigned
          path: apps/ios/build/OpenClaw.ipa
          retention-days: 7
